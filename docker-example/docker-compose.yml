version: "3"

# ─────────────────────────────────────────────────────────────────────────────
# CIB seven + OpenTelemetry example stack
#
# This is a minimal setup that sends traces directly to Jaeger via OTLP.
# No separate OTel Collector needed — Jaeger accepts OTLP natively.
#
# Services:
#   cibseven — BPM engine with the OTel plugin
#   jaeger   — trace collector + UI → http://localhost:16686
#
# Usage:
#   docker-compose up -d
#   Open Jaeger UI: http://localhost:16686
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── CIB seven BPM Engine ─────────────────────────────────────────────────
  cibseven:
    image: cibseven/cibseven:latest
    container_name: cibseven
    restart: always
    ports:
      - "8080:8080"
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
      OTEL_TRACES_EXPORTER: "otlp"
      OTEL_METRICS_EXPORTER: "otlp"
      OTEL_SERVICE_NAME: "cibseven-bpm"
    depends_on:
      - jaeger

  # ── Jaeger (trace collector + UI) ────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      - "4318:4318"     # OTLP HTTP receiver
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
