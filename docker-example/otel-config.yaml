receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 512

exporters:
  jaeger:
    endpoint: jaeger:14250
    tls:
      insecure: true

  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: cibseven

  logging:
    loglevel: info

service:
  pipelines:
    traces:
      receivers:  [otlp]
      processors: [batch]
      exporters:  [jaeger, logging]
    metrics:
      receivers:  [otlp]
      processors: [batch]
      exporters:  [prometheus, logging]
    logs:
      receivers:  [otlp]
      processors: [batch]
      exporters:  [logging]
